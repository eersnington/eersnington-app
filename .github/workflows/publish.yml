name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact eersnington version to publish, e.g. 0.1.0
        required: true
      confirm:
        description: Type publish eersnington@<version>
        required: true
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta

permissions:
  contents: read

jobs:
  verify:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm Trusted Publishing requires npm >= 11.5.1 and Node >= 22.14.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate release request
        env:
          INPUT_CONFIRM: ${{ inputs.confirm }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          package_version="$(node -p "require('./apps/tui/package.json').version")"
          expected_confirm="publish eersnington@${package_version}"

          if [ "${INPUT_VERSION}" != "${package_version}" ]; then
            printf 'Refusing to publish: workflow input version "%s" does not match apps/tui/package.json version "%s". Update apps/tui/package.json and dispatch this workflow with the exact package version.\n' "${INPUT_VERSION}" "${package_version}" >&2
            exit 1
          fi

          if [ "${INPUT_CONFIRM}" != "${expected_confirm}" ]; then
            printf 'Refusing to publish: confirmation must exactly equal "%s". No package was published.\n' "${expected_confirm}" >&2
            exit 1
          fi

          if npm view "eersnington@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            printf 'Refusing to publish: eersnington@%s already exists on npm. The registry was not changed.\n' "${package_version}" >&2
            exit 1
          fi

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Check TUI
        working-directory: apps/tui
        run: bun run check-types

      - name: Build TUI
        working-directory: apps/tui
        run: bun run build

      - name: Pack eersnington
        working-directory: apps/tui
        run: |
          mkdir -p ../../release-artifacts
          npm pack --pack-destination ../../release-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: eersnington-package
          path: release-artifacts/eersnington-*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      # npm Trusted Publishing requires npm >= 11.5.1 and Node >= 22.14.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          name: eersnington-package
          path: release-artifacts

      - name: Publish eersnington (OIDC, no token)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: npm publish "release-artifacts/eersnington-${INPUT_VERSION}.tgz" --provenance --tag "${NPM_TAG}" --ignore-scripts
