name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version to publish for both packages, e.g. 0.1.1
        required: true
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate release request
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "${INPUT_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            printf 'Refusing to publish: workflow input version "%s" is not a valid semver version. No package was published.\n' "${INPUT_VERSION}" >&2
            exit 1
          fi

          for package_name in \
            sreenarayanan \
            eersnington \
            @eersnington/tui-darwin-arm64 \
            @eersnington/tui-darwin-x64 \
            @eersnington/tui-linux-arm64-gnu \
            @eersnington/tui-linux-x64-gnu \
            @eersnington/tui-linux-arm64-musl \
            @eersnington/tui-linux-x64-musl; do
            if npm view "${package_name}@${INPUT_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              printf 'Refusing to publish: %s@%s already exists on npm. The registry was not changed.\n' "${package_name}" "${INPUT_VERSION}" >&2
              exit 1
            fi
          done

  build-native:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: darwin-arm64
            rust_target: aarch64-apple-darwin
            deployment_target: "13.0"
          - runner: macos-15-intel
            platform: darwin-x64
            rust_target: x86_64-apple-darwin
            deployment_target: "13.0"
          - runner: ubuntu-latest
            platform: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            deployment_target: ""
          - runner: ubuntu-latest
            platform: linux-x64
            rust_target: x86_64-unknown-linux-gnu
            deployment_target: ""
          - runner: ubuntu-latest
            platform: linux-arm64-musl
            rust_target: aarch64-unknown-linux-musl
            deployment_target: ""
          - runner: ubuntu-latest
            platform: linux-x64-musl
            rust_target: x86_64-unknown-linux-musl
            deployment_target: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Add Rust target
        if: runner.os != 'Linux'
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Build native binary
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --locked --release --target "${{ matrix.rust_target }}" --manifest-path apps/tui/Cargo.toml
          else
            cargo build --locked --release --target "${{ matrix.rust_target }}" --manifest-path apps/tui/Cargo.toml
          fi

      - name: Verify macOS deployment target
        if: runner.os == 'macOS'
        run: |
          MIN_OS=$(otool -l "apps/tui/target/${{ matrix.rust_target }}/release/eersnington-tui" | awk '
            $1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_build = 1; next }
            in_build && $1 == "minos" { print $2; exit }
          ')
          if [ "$MIN_OS" != "${{ matrix.deployment_target }}" ]; then
            echo "::error::Expected macOS deployment target ${{ matrix.deployment_target }}, got $MIN_OS"
            exit 1
          fi

      - name: Stage native binary
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          mkdir -p "native/${PLATFORM}"
          install -m 755 "apps/tui/target/${RUST_TARGET}/release/eersnington-tui" "native/${PLATFORM}/eersnington"

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: native
          if-no-files-found: error

  publish:
    needs: [validate, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: apps/tui/dist/bin
          merge-multiple: true

      - name: Restore native binary executable bits
        run: |
          chmod 755 apps/tui/dist/bin/darwin-arm64/eersnington
          chmod 755 apps/tui/dist/bin/darwin-x64/eersnington
          chmod 755 apps/tui/dist/bin/linux-arm64/eersnington
          chmod 755 apps/tui/dist/bin/linux-x64/eersnington
          chmod 755 apps/tui/dist/bin/linux-arm64-musl/eersnington
          chmod 755 apps/tui/dist/bin/linux-x64-musl/eersnington

      - name: Assemble npm package
        working-directory: apps/tui
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: bun run assemble

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/tui/Cargo.toml --check

      - name: Test Rust TUI
        run: cargo test --manifest-path apps/tui/Cargo.toml

      - name: Lint Rust TUI
        run: cargo clippy --manifest-path apps/tui/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Check npm package
        working-directory: apps/tui
        run: REQUIRE_ALL_NATIVE_PACKAGES=1 bun run check-types

      - name: Preview npm package
        working-directory: apps/tui
        run: |
          npm pack --dry-run
          for package_dir in npm/native/*; do
            (cd "${package_dir}" && npm pack --dry-run)
          done

      - name: Publish npm packages (OIDC, no token)
        env:
          INPUT_VERSION: ${{ inputs.version }}
          NPM_TAG: ${{ inputs.npm_tag }}
        working-directory: apps/tui
        run: |
          for package_dir in npm/native/*; do
            printf 'Publishing %s@%s from %s\n' "$(node -p "require('./${package_dir}/package.json').name")" "${INPUT_VERSION}" "${package_dir}"
            (cd "${package_dir}" && npm publish --provenance --access public --tag "${NPM_TAG}" --ignore-scripts)
          done

          for package_name in sreenarayanan eersnington; do
            npm pkg set "name=${package_name}"
            npm pkg set 'bin.eersnington=./dist/cli.js'
            npm pkg set 'bin.sreenarayanan=./dist/cli.js'

            printf 'Publishing %s@%s from apps/tui\n' "${package_name}" "${INPUT_VERSION}"
            npm publish --provenance --tag "${NPM_TAG}" --ignore-scripts
          done
